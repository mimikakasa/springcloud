spring:
  application:
    name: eureka-server

# ===================== 高可用节点 1：8888 =====================
---
spring:
  profiles: node1

server:
  port: 8888

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:9999/eureka/

# ===================== 高可用节点 2：9999 =====================
---
spring:
  profiles: node2

server:
  port: 9999

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8888/eureka/
